<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>и‡єзѕ…ж‹јйџіиЅ‰жЏ›е·Ґе…·</title>
    <script src="web_database.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;

        body {

        .container { max-width: 900px; margin: 0 auto; }

        .card {
            background: var(--card-bg);

        }

        .card-header {

            border-bottom: 2px solid var(--bg-color);

        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }

        .result-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;

            margin-top: 10px;
        }

        .result-label { font-size: 0.8em; color: #7f8c8d; margin-bottom: 4px; }
        .result-content { font-size: 1.2em; font-weight: bold; color: #2c3e50; min-height: 1.2em; }

        /* --- и©ізґ°иі‡иЁЉдЅ€е±Ђ --- */
        #hanjiDetails { display: flex; flex-direction: column; gap: 4px; }

        .detail-row {
            display: flex;
            align-items: flex-start;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .hanji-col {
            min-width: 35px;
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            border-right: 2px solid #eee;
            margin-right: 12px;
        }

        .readings-col { display: flex; flex-wrap: wrap; gap: 8px; }

        .variant-item {
            cursor: pointer;
            padding: 4px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background-color: #fff;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .variant-item:hover {
            background-color: #ebf5ff;
            border-color: var(--accent-color);
        }

        .badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.75em;
            margin-right: 5px;
            color: white;
            font-weight: bold;
        }

        .badge-man { background-color: #e74c3c; } /* ж–‡ */
        .badge-bo { background-color: #f39c12; }  /* з„Ў */
        .badge-peh { background-color: #27ae60; } /* з™Ѕ */
        .badge-sec { background-color: #95a5a6; } /* ж›їгЂЃдї— */

        .loading { text-align: center; color: #7f8c8d; padding: 40px; }
        .hidden { display: none; }
        .editable-result { width: 100%; padding: 10px; border: 1px solid #e9ecef; background-color: #f8f9fa; border-radius: 4px; font-size: 1.1em; font-weight: bold; color: #2c3e50; }
        
        .trace-box { font-size: 0.85em; color: #666; font-family: monospace; margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; }
    </style>
</head>
<body>

<div id="loading" class="loading">иі‡ж–™иј‰е…Ґдё­пјЊи«‹зЁЌеЂ™...</div>

<div id="app" class="container hidden">
    <h1>и‡єзѕ…ж‹јйџій›ўз·љиЅ‰жЏ›е·Ґе…·</h1>

    <div class="card">
        <div class="card-header">рџ…°пёЏ жјўе­—иЅ‰и‡єзѕ…</div>
        <div style="margin-bottom:10px;">
            <label style="font-weight:bold; font-size: 0.9em;">ијёе…Ґжјўе­—пјљ</label>
            <input type="text" id="hanjiInput" placeholder="дѕ‹е¦‚пјљи‡єзЃЈ" oninput="convertHanji()">
        </div>
        
        <div class="result-box">
            <div class="result-label">е»єи­°и‡єзѕ… (й»ћж“Љдё‹ж–№йЃёй …еЏЇеЌіж™‚ж›ґжЏ›и®Ђйџі)</div>
            <div id="hanjiResult" class="result-content">-</div>
        </div>
        
        <div class="result-box" style="background: white;">
            <div class="result-label">и©ізґ°иі‡иЁЉ</div>
            <div id="hanjiDetails"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">рџ—ЈпёЏ IPA иЅ‰и‡єзѕ…</div>
        <div style="margin-bottom:10px;">
            <label style="font-weight:bold; font-size: 0.9em;">йЃёж“‡иЄћиЁЂпјљ</label>
            <select id="langSelect" onchange="convertIPA()" style="width: auto;">
                <option value="и‹±">и‹±иЄћ</option>
                <option value="еѕ·">еѕ·иЄћ</option>
                <option value="жі•">жі•иЄћ</option>
                <option value="иҐї">иҐїзЏ­з‰™иЄћ</option>
                <option value="зѕ©">зѕ©е¤§е€©иЄћ</option>
                <option value="дї„">дї„иЄћ</option>
            </select>
        </div>
        <div style="margin-bottom:10px;">
            <label style="font-weight:bold; font-size: 0.9em;">ијёе…Ґ IPAпјљ</label>
            <input type="text" id="ipaInput" placeholder="дѕ‹е¦‚пјљbЙ‘ЙљЛ€bedos" oninput="convertIPA()">
        </div>
        <div class="result-box">
            <div class="result-label">иЅ‰жЏ›зµђжћњ (еЏЇж‰‹е‹•дї®ж”№)</div>
            <input type="text" id="ipaResult" class="editable-result" value="-">
            <div id="ipaTrace" class="trace-box"></div>
        </div>
    </div>
</div>

<script>
    let DB = null;
    let selectedReadings = []; 

    window.onload = function() {
        if (window.TAILO_DB) {
            DB = window.TAILO_DB;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            console.log("иі‡ж–™еє«иј‰е…Ґж€ђеЉџ:", Object.keys(DB.ipa)); // еЃµйЊЇз”Ё
        } else {
            alert("йЊЇиЄ¤пјљз„Ўжі•и®ЂеЏ– web_database.js");
        }
    };

    function isHanji(char) { return /\p{Unified_Ideograph}/u.test(char); }

    function updateReading(index, newPinyin) {
        selectedReadings[index].pinyin = newPinyin;
        renderHanjiResult();
    }

    function renderHanjiResult() {
        const resultDiv = document.getElementById('hanjiResult');
        let output = "";
        for (let i = 0; i < selectedReadings.length; i++) {
            const current = selectedReadings[i];
            const next = selectedReadings[i + 1];
            output += current.pinyin;
            if (current.isHan && next && next.isHan) {
                output += "-";
            }
        }
        resultDiv.innerText = output || "-";
    }

    function convertHanji() {
        const input = document.getElementById('hanjiInput').value;
        const detailsDiv = document.getElementById('hanjiDetails');
        if (!input) {
            selectedReadings = [];
            document.getElementById('hanjiResult').innerText = "-";
            detailsDiv.innerHTML = "";
            return;
        }

        selectedReadings = [];
        let detailsHtml = "";
        const chars = Array.from(input); 

        chars.forEach((char, idx) => {
            const isH = isHanji(char);
            let defaultPinyin = char;
            let rowReadings = "";

            if (isH && DB.hanji[char]) {
                const data = DB.hanji[char];
                // е„Єе…€й †еєЏпјљж–‡ > з„Ў > з™Ѕ
                if (data['ж–‡'] && data['ж–‡'].length > 0) defaultPinyin = data['ж–‡'][0];
                else if (data['з„Ў'] && data['з„Ў'].length > 0) defaultPinyin = data['з„Ў'][0];
                else if (data['з™Ѕ'] && data['з™Ѕ'].length > 0) defaultPinyin = data['з™Ѕ'][0];

                const types = [
                    {k: 'ж–‡', c: 'badge-man'}, {k: 'з„Ў', c: 'badge-bo'}, 
                    {k: 'з™Ѕ', c: 'badge-peh'}, {k: 'ж›ї', c: 'badge-sec'}, {k: 'дї—', c: 'badge-sec'}
                ];

                types.forEach(t => {
                    if (data[t.k]) {
                        data[t.k].forEach(p => {
                            rowReadings += `
                                <div class="variant-item" onclick="updateReading(${idx}, '${p}')">
                                    <span class="badge ${t.c}">${t.k}</span>${p}
                                </div>`;
                        });
                    }
                });
                detailsHtml += `<div class="detail-row"><div class="hanji-col">${char}</div><div class="readings-col">${rowReadings}</div></div>`;
            } else if (isH) {
                detailsHtml += `<div class="detail-row"><div class="hanji-col">${char}</div><div class="readings-col" style="color:#999;">жњЄж”¶йЊ„</div></div>`;
            }
            selectedReadings.push({ pinyin: defaultPinyin, isHan: isH });
        });

        detailsDiv.innerHTML = detailsHtml;
        renderHanjiResult();
    }

    // --- IPA иЅ‰жЏ›ж ёеїѓй‚ЏијЇ (дї®ж­Јиі‡ж–™и·Їеѕ‘) ---
    // --- IPA иЅ‰жЏ›ж ёеїѓй‚ЏијЇ ---
    function segmentAndConvert(ipaStr, langData) {
        // з›ґжЋҐеѕће‚іе…Ґзљ„иЄћиЁЂиі‡ж–™дё­еЏ–еѕ— combinations
        const comboMap = langData.combinations;
        const sortedKeys = Object.keys(comboMap).sort((a, b) => b.length - a.length);
        
        let i = 0, segments = [], trace = [];
        while (i < ipaStr.length) {
            let matched = false;
            for (let key of sortedKeys) {
                if (ipaStr.startsWith(key, i)) {
                    let val = comboMap[key];
                    segments.push(val);
                    trace.push(`'${key}'в†’${val}`);
                    i += key.length; 
                    matched = true; 
                    break;
                }
            }
            if (!matched) i++; // и‹ҐжњЄеЊ№й…ЌпјЊи·ійЃЋи©Іе­—е…ѓ
        }
        return { segments, trace };
    }
    
    function convertIPA() {
        const ipaInput = document.getElementById('ipaInput').value.trim();
        const lang = document.getElementById('langSelect').value;
        const resultInput = document.getElementById('ipaResult');
        const traceDiv = document.getElementById('ipaTrace');
    
        // гЂђй—њйЌµдї®ж­ЈгЂ‘пјљи·Їеѕ‘еї…й €жЊ‡еђ‘ "2026дї®иЁ‚"
        const ipaDb = DB.ipa['2026дї®иЁ‚']; 
        
        if (!ipaInput || !ipaDb) {
            resultInput.value = "-";
            traceDiv.innerHTML = "";
            return;
        }
    
        // еЏ–еѕ—жЊ‡е®љиЄћиЁЂзљ„иі‡ж–™
        const langData = ipaDb.languages[lang];
        if (!langData) {
            resultInput.value = "[иЄћиЁЂжњЄж”¶йЊ„]";
            return;
        }
    
        const words = ipaInput.split(/\s+/);
        let finalOutputList = [], totalTraceLog = [];
    
        words.forEach((word, idx) => {
            // жё…зђ†й•·йџіз¬¦и™џпјЊдё¦ж №ж“љй‡Ќйџі/йџізЇЂз¬¦и™џе€‡е€†
            let syllables = word.replace(/Лђ/g, '').split(/[Л€ЛЊ.\-]/).filter(p => p.trim());
            let wordSegs = [], wordTrace = [];
    
            syllables.forEach(syllable => {
                // е‘јеЏ«иЅ‰жЏ›й‚ЏијЇ
                let res = segmentAndConvert(syllable, langData);
                if (res.segments.length > 0) {
                    // е°‡еђЊдёЂеЂ‹йџізЇЂе…§зљ„зўЋз‰‡ж‹јжЋҐиµ·дѕ†
                    wordSegs.push(res.segments.join("")); 
                }
                wordTrace.push(...res.trace);
            });
    
            if (wordSegs.length > 0) {
                // дёЌеђЊйџізЇЂд№‹й–“з”Ё "-" йЂЈжЋҐ
                finalOutputList.push(wordSegs.join("-"));
            }
            if (wordTrace.length > 0) {
                totalTraceLog.push(`[и©ћ${idx+1}] ${wordTrace.join(", ")}`);
            }
        });
    
        // жњЂзµ‚зµђжћњи©ћи€‡и©ћд№‹й–“еЉ з©єж јпјЊдё¦и™•зђ†й¦–е­—жЇЌе¤§еЇ«
        let finalRes = finalOutputList.join(" ");
        if (finalRes) {
            finalRes = finalRes.charAt(0).toUpperCase() + finalRes.slice(1);
            resultInput.value = finalRes;
        } else {
            resultInput.value = "-";
        }
        traceDiv.innerHTML = totalTraceLog.join("<br>");
    }
</script>
</body>
</html>
